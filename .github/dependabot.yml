version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        dependency-type: development
      next-ecosystem:
        patterns:
          - next
          - react
          - react-dom
          - eslint-config-next

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
